{% extends "base.html" %}
{% block title %}Подразделения{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3 class="mb-0">Подразделения</h3>
  <a href="{{ url_for('admin.new_department') }}" class="btn btn-primary">+ Новое подразделение</a>
</div>
<table class="table table-hover">
  <thead><tr><th>Название</th><th>Сотрудников</th><th></th></tr></thead>
  <tbody>
    {% for d in departments %}
    <tr>
      <td>{{ d.name }}</td>
      <td>{{ d.users|length }}</td>
      <td><a href="{{ url_for('admin.edit_department', department_id=d.id) }}" class="btn btn-sm btn-outline-primary">Изменить</a></td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
